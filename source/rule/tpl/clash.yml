mixed-port: 7890
allow-lan: false
mode: Rule
log-level: info
external-controller: :9090
experimental:
    ignore-resolve-fail: true
    sniff-tls-sni: true
dns:
    enable: true
    ipv6: false
    listen: 0.0.0.0:5353
    enhanced-mode: fake-ip
    fake-ip-range: 198.18.0.1/16
    fake-ip-filter:
        - '*.lan'
		- '*.test'
        - localhost.ptlogin2.qq.com
    nameserver:
        - 119.29.29.29
        - 223.5.5.5
		- 180.184.1.1
  		- 94.140.14.14
        - tls://dot.pub
		- tls://dns.alidns.com
  		- tls://dns.adguard.com
        - https://doh.pub/dns-query
        - https://dns.alidns.com/dns-query
		- https://dns.adguard.com/dns-query
    fallback:
        - 8.8.8.8
        - 1.1.1.1
		- 94.140.14.14
  		- tls://dns.google
		- tls://one.one.one.one
  		- tls://dns.adguard.com
		- https://dns.google/dns-query
  		- https://cloudflare-dns.com/dns-query
		- https://dns.adguard.com/dns-query
    fallback-filter:
        geoip: true
        geoip-code: CN
        ipcidr:
            - 240.0.0.0/4
	nameserver-policy:
      '+.qq.com': '119.29.29.29'
	  '+.baidu.com': '119.29.29.29'
   	  '+.taobao.com': '223.5.5.5'
	  '+.alipay.com': '223.5.5.5'
