mixed-port: 7890
allow-lan: false
mode: Rule
log-level: info
external-controller: :9090
experimental:
    ignore-resolve-fail: true
    sniff-tls-sni: true
dns:
    enable: true
    ipv6: false
    listen: 0.0.0.0:5353
    enhanced-mode: fake-ip
    fake-ip-range: 198.18.0.1/16
    fake-ip-filter:
        - '*.lan'
        - localhost.ptlogin2.qq.com
    nameserver:
        - 119.29.29.29
        - 223.5.5.5
        - 114.114.114.114
        - tls://dot.pub
        - https://doh.pub/dns-query
        - https://dns.alidns.com/dns-query
    fallback:
        - 8.8.8.8
        - 1.1.1.1
        - tls://dns.rubyfish.cn:853
        - tls://1.0.0.1:853
        - tls://dns.google:853
        - https://dns.rubyfish.cn/dns-query
        - https://cloudflare-dns.com/dns-query
        - https://dns.google/dns-query
    fallback-filter:
        geoip: true
        geoip-code: CN
        ipcidr:
            - 240.0.0.0/4

